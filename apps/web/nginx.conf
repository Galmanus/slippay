# slippay-web · nginx serve static SPA
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip on for text assets
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml application/wasm;

  # SDK file: aggressive cache + CORS so merchants can <script src> from anywhere
  location = /sdk.js {
    add_header Cache-Control "public, max-age=300, s-maxage=86400, stale-while-revalidate=604800" always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;
    add_header X-Content-Type-Options nosniff always;
    try_files $uri =404;
  }

  # Hero asset — long cache (immutable filename if hashed by Vite, fine to cache)
  location = /hero.png {
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    try_files $uri =404;
  }

  # Hashed bundle assets from Vite — long cache
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # Checkout route can be embedded in iframes (the SDK depends on this)
  location ~ ^/checkout/ {
    add_header Content-Security-Policy "frame-ancestors *" always;
    add_header X-Frame-Options "ALLOWALL" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    try_files $uri $uri/ /index.html;
  }

  # Default SPA catch-all + base security headers
  location / {
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    try_files $uri $uri/ /index.html;
  }
}
