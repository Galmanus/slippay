<svg width="200" height="180" viewBox="0 0 200 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- coin dropping in -->
  <circle cx="100" cy="30" r="19" fill="#0a0a0a"/>
  <text x="100" y="38" text-anchor="middle" font-family="'Space Grotesk',Arial,sans-serif" font-size="22" font-weight="700" fill="#FDDA24">$</text>
  <!-- coin slot -->
  <rect x="78" y="62" width="44" height="10" rx="5" fill="#0a0a0a"/>
  <!-- body (the high-tech cofrinho / vault) -->
  <rect x="32" y="70" width="136" height="82" rx="30" fill="#FDDA24" stroke="#0a0a0a" stroke-width="7"/>
  <!-- screen with live pulse -->
  <rect x="62" y="96" width="76" height="38" rx="10" fill="#0a0a0a"/>
  <polyline points="72,117 85,117 91,106 100,126 109,111 116,117 128,117" fill="none" stroke="#FDDA24" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- live status dot -->
  <circle cx="150" cy="84" r="4.5" fill="#0a0a0a"/>
  <!-- feet -->
  <rect x="56" y="148" width="17" height="14" rx="4" fill="#0a0a0a"/>
  <rect x="127" y="148" width="17" height="14" rx="4" fill="#0a0a0a"/>
</svg>
