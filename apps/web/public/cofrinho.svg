<svg width="220" height="190" viewBox="0 0 220 190" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- coins falling into the slot -->
  <g font-family="'Space Grotesk',Arial,sans-serif" font-weight="700" text-anchor="middle">
    <circle cx="132" cy="22" r="12" fill="#0a0a0a"/>
    <text x="132" y="27.5" font-size="14" fill="#FDDA24">$</text>
    <circle cx="90" cy="30" r="11" fill="#0a0a0a"/>
    <text x="90" y="35" font-size="13" fill="#FDDA24">$</text>
    <circle cx="110" cy="48" r="14" fill="#0a0a0a"/>
    <text x="110" y="54" font-size="16" fill="#FDDA24">$</text>
  </g>
  <!-- coin slot (clearly on the lid) -->
  <rect x="83" y="64" width="54" height="12" rx="6" fill="#0a0a0a"/>
  <!-- body: rounded money box -->
  <rect x="38" y="72" width="144" height="84" rx="38" fill="#FDDA24" stroke="#0a0a0a" stroke-width="7"/>
  <!-- small live screen (high-tech cue) -->
  <rect x="82" y="106" width="56" height="24" rx="7" fill="#0a0a0a"/>
  <polyline points="90,118 99,118 104,110 110,126 116,112 121,118 130,118" fill="none" stroke="#FDDA24" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- feet -->
  <rect x="62" y="152" width="17" height="14" rx="4" fill="#0a0a0a"/>
  <rect x="141" y="152" width="17" height="14" rx="4" fill="#0a0a0a"/>
</svg>
